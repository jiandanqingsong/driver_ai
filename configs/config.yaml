project:
  name: driver_distraction_ascend
  output_dir: outputs
  seed: 42
  device: cuda

data:
  name: state_farm_distracted_driver_detection
  root: data/statefarm
  image_dir: train
  metadata_csv: driver_imgs_list.csv
  num_classes: 10
  input_size: 224
  num_workers: 4
  pin_memory: true
  class_names:
    - safe_driving
    - texting_right
    - talking_phone_right
    - texting_left
    - talking_phone_left
    - operating_radio
    - drinking
    - reaching_behind
    - hair_and_makeup
    - talking_to_passenger
  split:
    strategy: driver_id
    val_ratio: 0.15
    test_ratio: 0.15
    random_seed: 42
    explicit_val_drivers: []
    explicit_test_drivers: []
    split_file: outputs/splits/statefarm_driver_split.json

train:
  model_name: mobilenet_v3_large
  compare_model_name: resnet18
  pretrained: true
  batch_size: 32
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  label_smoothing: 0.05
  amp: true
  optimizer: adamw
  scheduler: cosine
  save_best_metric: val_acc
  checkpoint_dir: outputs/checkpoints

eval:
  checkpoint: outputs/checkpoints/best.pt
  split: test
  batch_size: 64
  confusion_matrix_path: outputs/reports/confusion_matrix.png
  classification_report_path: outputs/reports/classification_report.txt

gradcam:
  checkpoint: outputs/checkpoints/best.pt
  image_path: data/statefarm/train/c0/example.jpg
  target_class: null
  output_path: outputs/gradcam/overlay.jpg
  alpha: 0.45

export:
  checkpoint: outputs/checkpoints/best.pt
  onnx_path: outputs/export/driver_distraction.onnx
  opset_version: 17
  dynamic_batch: true
  input_name: input
  output_name: logits

ascend:
  om_path: outputs/export/driver_distraction.om
  soc_version: Ascend310P3
  input_shape: "input:1,3,224,224"
  precision_mode: allow_fp32_to_fp16
  atc_log: outputs/export/atc.log

realtime:
  source: 0
  checkpoint: outputs/checkpoints/best.pt
  model_name: mobilenet_v3_large
  input_size: 224
  display_width: 960
  confidence_threshold: 0.55
  unknown_label: unknown
  ema_alpha: 0.35
  abnormal_hold_seconds: 2.0
  alarm_cooldown_seconds: 8.0
  risk_decay: 0.92
  risk_thresholds:
    low: 25
    medium: 50
    high: 75
  class_risk_weights:
    safe_driving: 0
    texting_right: 85
    talking_phone_right: 75
    texting_left: 85
    talking_phone_left: 75
    operating_radio: 45
    drinking: 60
    reaching_behind: 90
    hair_and_makeup: 65
    talking_to_passenger: 35
    unknown: 40
  voice:
    enabled: true
    rate: 180
    message_template: "Warning, distracted driving detected: {label}, risk level {level}"
